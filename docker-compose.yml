# CrewChief Web UI Docker Compose Configuration
# Production-ready configuration for the full stack

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: crewchief-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CREWCHIEF_DB_NAME:-crewchief}
      POSTGRES_USER: ${CREWCHIEF_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${CREWCHIEF_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${CREWCHIEF_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/web-ui/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - crewchief-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CREWCHIEF_DB_USER:-postgres} -d ${CREWCHIEF_DB_NAME:-crewchief}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: crewchief-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-crewchief}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - crewchief-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-crewchief}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # CrewChief Web UI Application
  web-ui:
    build:
      context: .
      dockerfile: packages/web-ui/Dockerfile
      target: production
    container_name: crewchief-web-ui
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3456
      # Database configuration
      CREWCHIEF_DB_HOST: postgres
      CREWCHIEF_DB_PORT: 5432
      CREWCHIEF_DB_NAME: ${CREWCHIEF_DB_NAME:-crewchief}
      CREWCHIEF_DB_USER: ${CREWCHIEF_DB_USER:-postgres}
      CREWCHIEF_DB_PASSWORD: ${CREWCHIEF_DB_PASSWORD}
      CREWCHIEF_DB_SSL: "false"
      CREWCHIEF_DB_POOL_MAX: ${CREWCHIEF_DB_POOL_MAX:-20}
      CREWCHIEF_DB_POOL_MIN: ${CREWCHIEF_DB_POOL_MIN:-5}
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-crewchief}
      # Application configuration
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3456}
    ports:
      - "${WEB_UI_PORT:-3456}:3456"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crewchief-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  crewchief-network:
    driver: bridge
    name: crewchief-network

volumes:
  postgres_data:
    driver: local
    name: crewchief-postgres-data
  redis_data:
    driver: local
    name: crewchief-redis-data