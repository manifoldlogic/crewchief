version: '3.8'

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - crewchief-cargo-cache:/home/vscode/.cargo
      - crewchief-pnpm-cache:/home/vscode/.pnpm-store
      - crewchief-vscode-extensions:/home/vscode/.vscode-server/extensions
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/crewchief
      - REDIS_URL=redis://redis:6379
      - CREWCHIEF_DB_HOST=postgres
      - CREWCHIEF_DB_PORT=5432
      - CREWCHIEF_DB_NAME=crewchief
      - CREWCHIEF_DB_USER=postgres
      - CREWCHIEF_DB_PASSWORD=postgres
    command: sleep infinity
    networks:
      - crewchief-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=crewchief
    networks:
      - crewchief-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crewchief"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - crewchief-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@crewchief.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    networks:
      - crewchief-network
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - crewchief-network
    depends_on:
      - redis

networks:
  crewchief-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:
  crewchief-cargo-cache:
  crewchief-pnpm-cache:
  crewchief-vscode-extensions: