services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    # Add capabilities required for Claude Code dangerous mode
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    privileged: true  # Required for iptables manipulation
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - crewchief-cargo-cache:/home/vscode/.cargo
      - crewchief-pnpm-cache:/home/vscode/.pnpm-store
      - crewchief-vscode-extensions:/home/vscode/.vscode-server/extensions
      - crewchief-cursor-extensions:/home/vscode/.cursor-server/extensions
      - crewchief-claude-config:/home/vscode/.claude
      - crewchief-claude-history:/commandhistory
    working_dir: /workspace
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/crewchief
      - CREWCHIEF_DB_HOST=postgres
      - CREWCHIEF_DB_PORT=5432
      - CREWCHIEF_DB_NAME=crewchief
      - CREWCHIEF_DB_USER=postgres
      - CREWCHIEF_DB_PASSWORD=postgres
      # Claude Code environment
      - CLAUDE_CONFIG_DIR=/home/vscode/.claude
      - CLAUDE_DANGEROUS_MODE=true
      - NODE_OPTIONS=--max-old-space-size=4096
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    command: sleep infinity
    networks:
      - crewchief-network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=crewchief
    networks:
      - crewchief-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crewchief"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  crewchief-network:
    driver: bridge

volumes:
  postgres-data:
  crewchief-cargo-cache:
  crewchief-pnpm-cache:
  crewchief-vscode-extensions:
  crewchief-cursor-extensions:
  crewchief-claude-config:
  crewchief-claude-history: