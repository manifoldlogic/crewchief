name: MSRV

on:
  push:
    branches: [main]
    paths:
      - "crates/maproom/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "crates/maproom/**"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  msrv:
    name: Minimum Supported Rust Version (1.85)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust 1.85 toolchain
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"
          shared-key: msrv

      - name: Build with MSRV
        run: cargo build -p maproom
