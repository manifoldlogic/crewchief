name: Release Maproom MCP (npm)

on:
  push:
    tags:
      - '@crewchief/maproom-mcp@v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # For npm provenance

jobs:
  # Job 1: Build Rust binaries (reusable)
  build-rust:
    name: Build Rust Binaries
    uses: ./.github/workflows/reusable-rust-build.yml
    with:
      package_name: maproom-mcp
      binary_name: crewchief-maproom
      crate_path: crates/maproom

  # Job 2: Build TypeScript (reusable)
  build-typescript:
    name: Build TypeScript
    uses: ./.github/workflows/reusable-typescript-build.yml
    with:
      workspace_filter: '@crewchief/maproom-mcp...'
      artifact_name: 'maproom-mcp-typescript'

  # Job 3: Validate and publish (depends on both builds)
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build-rust, build-typescript]
    permissions:
      contents: read
      id-token: write  # Required for OIDC Trusted Publishers

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Download Rust binaries (Linux x64)
        uses: actions/download-artifact@v4
        with:
          name: maproom-mcp-linux-x64
          path: packages/maproom-mcp/bin/linux-x64/

      - name: Download Rust binaries (Linux ARM64)
        uses: actions/download-artifact@v4
        with:
          name: maproom-mcp-linux-arm64
          path: packages/maproom-mcp/bin/linux-arm64/

      - name: Download Rust binaries (Darwin x64)
        uses: actions/download-artifact@v4
        with:
          name: maproom-mcp-darwin-x64
          path: packages/maproom-mcp/bin/darwin-x64/

      - name: Download Rust binaries (Darwin ARM64)
        uses: actions/download-artifact@v4
        with:
          name: maproom-mcp-darwin-arm64
          path: packages/maproom-mcp/bin/darwin-arm64/

      - name: Download TypeScript dist
        uses: actions/download-artifact@v4
        with:
          name: maproom-mcp-typescript
          path: packages

      - name: Debug - Show downloaded files
        run: |
          echo "=== packages/ directory ==="
          ls -la packages/ || echo "packages/ not found"
          echo "=== packages/maproom-mcp/ ==="
          ls -la packages/maproom-mcp/ || echo "packages/maproom-mcp/ not found"
          echo "=== packages/maproom-mcp/dist/ ==="
          ls -la packages/maproom-mcp/dist/ || echo "packages/maproom-mcp/dist/ not found"

      - name: Verify binary structure
        run: |
          echo "Checking binary structure..."
          ls -R packages/maproom-mcp/bin/

          # Verify all 4 platforms present
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            if [ ! -f "packages/maproom-mcp/bin/$platform/crewchief-maproom" ]; then
              echo "ERROR: Missing binary for $platform"
              exit 1
            fi
            echo "✓ $platform binary found"
          done

      - name: Set executable permissions
        run: |
          find packages/maproom-mcp/bin -name "crewchief-maproom" -exec chmod +x {} \;

      - name: Verify binary sizes
        run: |
          #!/bin/bash
          set -e

          MIN_SIZE=1048576      # 1MB
          MAX_SIZE=104857600    # 100MB

          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            BINARY="packages/maproom-mcp/bin/$platform/crewchief-maproom"
            SIZE=$(stat -c%s "$BINARY")

            if [ "$SIZE" -lt "$MIN_SIZE" ]; then
              echo "ERROR: $platform binary too small ($SIZE bytes)"
              exit 1
            fi

            if [ "$SIZE" -gt "$MAX_SIZE" ]; then
              echo "ERROR: $platform binary too large ($SIZE bytes)"
              exit 1
            fi

            echo "✓ $platform binary size valid ($SIZE bytes)"
          done

      - name: Verify TypeScript dist directories
        run: |
          # Verify maproom-mcp dist/
          if [ ! -d "packages/maproom-mcp/dist" ]; then
            echo "ERROR: maproom-mcp dist not found"
            exit 1
          fi
          echo "✓ maproom-mcp dist found"
          ls -la packages/maproom-mcp/dist/

          # Verify daemon-client is embedded in maproom-mcp dist
          if [ ! -d "packages/maproom-mcp/dist/daemon-client" ]; then
            echo "ERROR: daemon-client embedded module not found"
            exit 1
          fi
          echo "✓ daemon-client embedded module found"
          ls -la packages/maproom-mcp/dist/daemon-client/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack package
        run: |
          cd packages/maproom-mcp
          # Clean up old tarballs
          rm -f *.tgz
          pnpm pack

      - name: Verify package
        run: |
          cd packages/maproom-mcp
          TARBALL=$(ls crewchief-maproom-mcp-*.tgz | head -1)
          echo "Package created: $TARBALL"
          tar -tzf "$TARBALL" | head -20

          # Verify all 4 binaries in tarball
          echo "Verifying binaries in tarball..."
          tar -tzf "$TARBALL" | grep "package/bin/linux-x64/crewchief-maproom"
          tar -tzf "$TARBALL" | grep "package/bin/linux-arm64/crewchief-maproom"
          tar -tzf "$TARBALL" | grep "package/bin/darwin-x64/crewchief-maproom"
          tar -tzf "$TARBALL" | grep "package/bin/darwin-arm64/crewchief-maproom"
          echo "✓ All binaries present in tarball"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        working-directory: packages/maproom-mcp
        run: pnpm publish --no-git-checks --access public

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-maproom-mcp
          path: packages/maproom-mcp/*.tgz
          retention-days: 90
