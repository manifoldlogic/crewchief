name: Build and Publish Maproom MCP

# Trigger on version tags (v1.2.3, v2.0.0, etc.) and manual dispatch
on:
  push:
    tags:
      - 'v*.*.*'
  # Allow manual triggering with dry-run option
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip publish)'
        required: false
        type: boolean
        default: false

# Prevent concurrent publishes for the same tag to avoid conflicts
# cancel-in-progress: false ensures publishes complete even if new tag is pushed
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build binaries for all 4 platforms in parallel using matrix strategy
  build-binaries:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x64 - Use cross-compilation for consistency and glibc compatibility
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            use_cross: true

          # Linux ARM64 - Cross-compile from x64 runner
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            use_cross: true

          # macOS x64 - Native build on Intel runner
          - os: macos-13
            target: x86_64-apple-darwin
            platform: darwin-x64
            use_cross: false

          # macOS ARM64 - Native build on Apple Silicon runner
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            use_cross: false

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Linux x64 build steps (BINPKG-1002)
      - name: Setup Rust toolchain
        if: matrix.platform == 'linux-x64'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross
        if: matrix.platform == 'linux-x64' && matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        if: matrix.platform == 'linux-x64'
        run: |
          cross build --release --target ${{ matrix.target }} --manifest-path crates/maproom/Cargo.toml

      - name: Strip binary
        if: matrix.platform == 'linux-x64'
        run: |
          strip target/${{ matrix.target }}/release/crewchief-maproom

      - name: Verify binary
        if: matrix.platform == 'linux-x64'
        run: |
          ls -lh target/${{ matrix.target }}/release/crewchief-maproom
          file target/${{ matrix.target }}/release/crewchief-maproom

      - name: Prepare artifact
        if: matrix.platform == 'linux-x64'
        run: |
          mkdir -p artifacts/bin/${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/crewchief-maproom artifacts/bin/${{ matrix.platform }}/

      - name: Upload artifact
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: maproom-${{ matrix.platform }}
          path: artifacts/bin/${{ matrix.platform }}
          if-no-files-found: error

      # Linux ARM64 build steps (BINPKG-1003)
      - name: Setup Rust toolchain
        if: matrix.platform == 'linux-arm64'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross
        if: matrix.platform == 'linux-arm64' && matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        if: matrix.platform == 'linux-arm64'
        run: |
          cross build --release --target ${{ matrix.target }} --manifest-path crates/maproom/Cargo.toml

      - name: Strip binary
        if: matrix.platform == 'linux-arm64'
        run: |
          docker run --rm -v $(pwd):/workspace -w /workspace ghcr.io/cross-rs/aarch64-unknown-linux-gnu:latest \
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/crewchief-maproom

      - name: Verify binary
        if: matrix.platform == 'linux-arm64'
        run: |
          ls -lh target/${{ matrix.target }}/release/crewchief-maproom
          file target/${{ matrix.target }}/release/crewchief-maproom

      - name: Prepare artifact
        if: matrix.platform == 'linux-arm64'
        run: |
          mkdir -p artifacts/bin/${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/crewchief-maproom artifacts/bin/${{ matrix.platform }}/

      - name: Upload artifact
        if: matrix.platform == 'linux-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: maproom-${{ matrix.platform }}
          path: artifacts/bin/${{ matrix.platform }}
          if-no-files-found: error

      # TODO (BINPKG-1004): Add macOS x64 build steps
      #   - Install Rust toolchain
      #   - Build maproom binary natively
      #   - Upload artifact

      # TODO (BINPKG-1005): Add macOS ARM64 build steps
      #   - Install Rust toolchain
      #   - Build maproom binary natively
      #   - Upload artifact

  # Validate all binaries and publish to npm (only after all builds succeed)
  validate-and-publish:
    name: Validate and Publish to npm
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      # TODO (BINPKG-1006): Add binary validation steps
      #   - Download all artifacts
      #   - Verify binary signatures/checksums
      #   - Test basic functionality (--version, --help)
      #   - Validate file structure matches package.json expectations

      # TODO (BINPKG-1007): Add npm publish steps
      #   - Set up Node.js
      #   - Install dependencies
      #   - Copy binaries to correct locations in packages/maproom-mcp/bin/
      #   - Update package.json version
      #   - Publish to npm (or skip if dry_run is true)
      #   - Create GitHub release with binaries
