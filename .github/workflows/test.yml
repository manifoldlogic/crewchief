name: Test

# Run tests on push to main and all pull request events
# Path filters: Only run tests when code, dependencies, workflows, or schemas change
on:
  push:
    branches:
      - main
    paths:
      # Rust code
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**.rs'

      # TypeScript code
      - 'packages/*/src/**'
      - 'packages/*/tests/**'
      - 'packages/**/package.json'
      - '**.ts'

      # Dependencies
      - 'pnpm-lock.yaml'

      # Workflows (self + reusables)
      - '.github/workflows/test.yml'
      - '.github/workflows/reusable-rust-build.yml'
      - '.github/workflows/reusable-typescript-build.yml'

      # Database schemas and migrations
      - 'packages/maproom-mcp/config/init.sql'
      - 'crates/maproom/migrations/**'

      # E2E tests
      - 'tests/e2e/**'

  pull_request:
    paths:
      # Same paths as push (keep in sync!)
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**.rs'
      - 'packages/*/src/**'
      - 'packages/*/tests/**'
      - 'packages/**/package.json'
      - '**.ts'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test.yml'
      - '.github/workflows/reusable-rust-build.yml'
      - '.github/workflows/reusable-typescript-build.yml'
      - 'packages/maproom-mcp/config/init.sql'
      - 'crates/maproom/migrations/**'
      # E2E tests
      - 'tests/e2e/**'

# Cancel in-progress runs for PRs only (let main builds complete)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    # Service container for isolated test database
    # Matches local development postgres-test configuration
    services:
      postgres-test:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: maproom_test
          POSTGRES_USER: maproom
          POSTGRES_PASSWORD: maproom
        ports:
          # Map container port 5432 to host port 5434 to match local dev
          - 5434:5432
        # Health checks ensure database is ready before tests run
        options: >-
          --health-cmd "pg_isready -U maproom -d maproom_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Test database connection URL - matches local docker-compose setup
      # Uses localhost:5434 from runner perspective
      TEST_MAPROOM_DATABASE_URL: postgresql://maproom:maproom@localhost:5434/maproom_test

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Setup pnpm (auto-detects version from package.json packageManager field)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Step 3a: Get pnpm store directory for caching
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # Step 3b: Setup pnpm cache
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Step 4: Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Step 5: Setup Rust toolchain for migration runner
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      # Step 6: Cache cargo dependencies to speed up builds
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"

      # Step 7: Initialize test database schema using Rust migrations
      # Critical: Service containers start fresh on each run, need schema setup
      # This step builds the Rust binary and runs all migrations from crates/maproom/migrations/
      - name: Initialize test database schema
        run: |
          echo "Waiting for PostgreSQL to be fully ready..."

          # Additional readiness check beyond health checks
          # Ensures database is accepting connections and ready for schema init
          max_attempts=30
          attempt=0

          until PGPASSWORD=maproom psql -h localhost -p 5434 -U maproom -d maproom_test -c '\q' 2>/dev/null; do
            attempt=$((attempt + 1))
            if [ $attempt -ge $max_attempts ]; then
              echo "ERROR: PostgreSQL failed to become ready after $max_attempts attempts"
              exit 1
            fi
            echo "Waiting for PostgreSQL... (attempt $attempt/$max_attempts)"
            sleep 1
          done

          echo "PostgreSQL is ready. Building Rust migration runner..."

          # Build the Rust binary with migration support
          cargo build --release --bin crewchief-maproom

          echo "Running database migrations..."

          # Run all migrations from crates/maproom/migrations/
          # This applies migrations 0000-0020, including the new BLOBSHA/BRANCHX migrations
          # that are missing from init.sql
          MAPROOM_DATABASE_URL=postgresql://maproom:maproom@localhost:5434/maproom_test \
            ./target/release/crewchief-maproom db migrate

          echo "Schema initialization via migrations complete"

          # Verify schema was created successfully
          echo "Verifying schema..."
          PGPASSWORD=maproom psql -h localhost -p 5434 -U maproom -d maproom_test \
            -c "SELECT schema_name FROM information_schema.schemata WHERE schema_name = 'maproom';"

      # Step 8: Run tests
      # Runs from packages/maproom-mcp directory
      # Uses TEST_MAPROOM_DATABASE_URL from environment
      - name: Run tests
        working-directory: packages/maproom-mcp
        run: pnpm test

      # Step 9: Verify test database usage (optional diagnostic step)
      # Shows that tests actually used the isolated test database
      # Helpful for debugging test isolation issues
      - name: Verify test database usage
        if: always()
        run: |
          echo "Test database statistics:"

          # Show basic connection info
          echo "Database connection test:"
          PGPASSWORD=maproom psql -h localhost -p 5434 -U maproom -d maproom_test \
            -c "SELECT current_database(), current_user, version();"

          # Show table counts (if any data was created during tests)
          echo ""
          echo "Checking for test data:"
          PGPASSWORD=maproom psql -h localhost -p 5434 -U maproom -d maproom_test \
            -c "SELECT
                  (SELECT COUNT(*) FROM maproom.repos) as repos,
                  (SELECT COUNT(*) FROM maproom.worktrees) as worktrees,
                  (SELECT COUNT(*) FROM maproom.chunks) as chunks,
                  (SELECT COUNT(*) FROM maproom.symbols) as symbols;" \
            || echo "Note: No test data found (expected for some test suites)"

  # Rust backend feature tests
  # Tests both sqlite and postgres features for compilation
  # SQLite tests run in-memory (no external service needed)
  test-rust:
    name: Test Rust (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: [sqlite, postgres]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"
          key: ${{ matrix.features }}

      - name: Check compilation
        run: cargo check --features ${{ matrix.features }}
        working-directory: crates/maproom

      - name: Run tests
        run: cargo test --features ${{ matrix.features }}
        working-directory: crates/maproom
        # Note: postgres tests requiring DB connection will be skipped
        # SQLite tests use :memory: and don't need external services

  # SQLite E2E Integration Tests
  # Tests CLI commands work correctly with SQLite backend
  test-sqlite-e2e:
    name: SQLite E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"
          key: sqlite-e2e

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run SQLite E2E tests
        run: ./tests/e2e/test_sqlite_flow.sh

  # =============================================================================
  # MCP Server SQLite Tests (TypeScript layer)
  # =============================================================================
  # Tests the TypeScript MCP server with SQLite backend via daemon.
  # NOTE: This is DIFFERENT from test-sqlite-e2e which tests the Rust CLI.
  #
  # test-sqlite-e2e:  Rust CLI + SQLite (cargo test)
  # test-mcp-sqlite:  TypeScript MCP + SQLite daemon (pnpm test:sqlite)
  # =============================================================================
  test-mcp-sqlite:
    name: MCP SQLite Tests (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust (for fixture generation if needed)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"
          key: mcp-sqlite

      - name: Ensure SQLite fixture exists
        run: |
          if [ ! -f crates/maproom/tests/fixtures/pre-indexed-maproom.db ]; then
            echo "SQLite fixture not found, generating..."
            cargo test --features sqlite --test create_sqlite_fixture -- --ignored
          else
            echo "SQLite fixture found"
          fi

      - name: Build MCP package
        working-directory: packages/maproom-mcp
        run: pnpm build

      - name: Run MCP SQLite tests
        working-directory: packages/maproom-mcp
        run: pnpm test:sqlite
        env:
          MAPROOM_DATABASE_URL: sqlite://${{ github.workspace }}/crates/maproom/tests/fixtures/pre-indexed-maproom.db
