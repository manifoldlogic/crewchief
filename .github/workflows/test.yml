name: Test

# =============================================================================
# CI Workflow: SQLite-Only Testing Strategy
# =============================================================================
#
# Tests CrewChief packages using SQLite as the only database backend.
# PostgreSQL support was intentionally removed for simplicity.
#
# DATABASE BACKEND:
#   - SQLite (Only): Zero-configuration, runs without external services
#   - No PostgreSQL support (intentionally removed for simplicity)
#
# JOB ORGANIZATION:
#   - test-sqlite-e2e: CLI end-to-end tests
#   - test-mcp-sqlite: TypeScript MCP server tests
#   - test-rust: Rust library tests
#   - test-typescript: TypeScript package tests (CLI, VSCode, daemon-client)
# =============================================================================

# Run tests only on pull requests
# Path filters: Only run tests when code, dependencies, workflows, or schemas change
on:
  pull_request:
    paths:
      # Rust code
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**.rs'

      # TypeScript code
      - 'packages/*/src/**'
      - 'packages/*/tests/**'
      - 'packages/**/package.json'
      - '**.ts'

      # Dependencies
      - 'pnpm-lock.yaml'

      # Workflows (self + reusables)
      - '.github/workflows/test.yml'
      - '.github/workflows/reusable-rust-build.yml'
      - '.github/workflows/reusable-typescript-build.yml'

      # Database schemas and migrations
      - 'packages/maproom-mcp/config/init.sql'
      - 'crates/maproom/migrations/**'

      # E2E tests
      - 'tests/e2e/**'

# Cancel in-progress runs for PRs only (let main builds complete)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # =============================================================================
  # TEST JOBS
  # =============================================================================

  # SQLite E2E Integration Tests
  # Tests CLI commands work correctly with SQLite backend
  test-sqlite-e2e:
    name: SQLite E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"
          key: sqlite-e2e

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run SQLite E2E tests
        run: ./tests/e2e/test_sqlite_flow.sh

      - name: Job Summary
        if: always()
        run: |
          echo "## 🗄️ SQLite E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** SQLite (primary)" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies:** None - runs standalone" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests CLI commands with SQLite backend (no Docker required)." >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # MCP Server SQLite Tests (TypeScript layer)
  # =============================================================================
  # Tests the TypeScript MCP server with SQLite backend via daemon.
  # NOTE: This is DIFFERENT from test-sqlite-e2e which tests the Rust CLI.
  #
  # test-sqlite-e2e:  Rust CLI + SQLite (cargo test)
  # test-mcp-sqlite:  TypeScript MCP + SQLite daemon (pnpm test:sqlite)
  # =============================================================================
  test-mcp-sqlite:
    name: MCP SQLite Tests (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust (for fixture generation if needed)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"
          key: mcp-sqlite

      - name: Ensure SQLite fixture exists
        run: |
          if [ ! -f crates/maproom/tests/fixtures/pre-indexed-maproom.db ]; then
            echo "SQLite fixture not found, generating..."
            cargo test --test create_sqlite_fixture -- --ignored
          else
            echo "SQLite fixture found"
          fi

      - name: Build MCP package
        working-directory: packages/maproom-mcp
        run: pnpm build

      - name: Run MCP SQLite tests
        working-directory: packages/maproom-mcp
        run: pnpm test:sqlite
        env:
          MAPROOM_DATABASE_URL: sqlite://${{ github.workspace }}/crates/maproom/tests/fixtures/pre-indexed-maproom.db

      - name: Job Summary
        if: always()
        run: |
          echo "## 🗄️ MCP SQLite Tests (TypeScript)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** SQLite (primary)" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies:** None - uses pre-indexed fixture" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests TypeScript MCP server with SQLite daemon." >> $GITHUB_STEP_SUMMARY

  # Rust SQLite feature tests
  # SQLite tests run in-memory (no external service needed)
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"
          key: sqlite

      - name: Check compilation
        run: cargo check
        working-directory: crates/maproom

      - name: Run tests
        # Use --test-threads=1 due to env var race conditions in config tests
        run: cargo test -- --test-threads=1
        working-directory: crates/maproom

      - name: Job Summary
        if: always()
        run: |
          echo "## 🦀 Rust Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** SQLite (only)" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies:** None - uses in-memory database" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests Rust \`maproom\` crate (SQLite is the only backend)." >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # DAEMON CLIENT INTEGRATION TESTS - Tests requiring Rust binary
  # =============================================================================
  # Tests daemon discovery, connect-or-spawn, and race condition handling.
  # These tests spawn actual daemon processes and require the Rust binary.
  # =============================================================================
  test-daemon-integration:
    name: Daemon Client Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"
          key: daemon-integration

      - name: Build Rust binary (release)
        run: cargo build --release
        working-directory: crates/maproom

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daemon-client package
        working-directory: packages/daemon-client
        run: pnpm build

      - name: Run integration tests
        working-directory: packages/daemon-client
        run: pnpm test:integration
        env:
          CI: true
          MAPROOM_BINARY_PATH: ${{ github.workspace }}/target/release/crewchief-maproom

      - name: Job Summary
        if: always()
        run: |
          echo "## 🔌 Daemon Client Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** Daemon discovery, connect-or-spawn, race conditions" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies:** Rust binary (built in job)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Integration tests for daemon-client that require spawning actual daemon processes." >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # TYPESCRIPT PACKAGE TESTS - Unit tests for CLI, VSCode, and Daemon packages
  # =============================================================================

  # TypeScript Package Unit Tests
  # Tests cli, vscode-maproom, and daemon-client packages
  test-typescript:
    name: TypeScript Package Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Test CLI package
        working-directory: packages/cli
        run: pnpm test
        env:
          CI: true

      - name: Test VSCode extension package
        working-directory: packages/vscode-maproom
        run: pnpm test
        env:
          CI: true

      - name: Test Daemon Client package
        working-directory: packages/daemon-client
        run: pnpm test
        env:
          CI: true

      - name: Job Summary
        if: always()
        run: |
          echo "## 📦 TypeScript Package Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Packages Tested:**" >> $GITHUB_STEP_SUMMARY
          echo "- cli: Worktree management and agent orchestration" >> $GITHUB_STEP_SUMMARY
          echo "- vscode-maproom: VSCode extension" >> $GITHUB_STEP_SUMMARY
          echo "- daemon-client: Daemon RPC client" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Unit tests for TypeScript packages (no database required)." >> $GITHUB_STEP_SUMMARY
