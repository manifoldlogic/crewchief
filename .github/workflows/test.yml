name: Test

# =============================================================================
# CI Workflow: SQLite-Only Testing Strategy
# =============================================================================
#
# Tests CrewChief packages using SQLite as the only database backend.
# PostgreSQL support was intentionally removed for simplicity.
#
# COST OPTIMIZATION:
#   Jobs only run when their relevant code changes. A 'changes' job detects
#   which paths changed, and subsequent jobs use conditions to skip when
#   their code hasn't changed.
#
# JOB ORGANIZATION:
#   - changes: Detect which paths changed (always runs, ~5s)
#   - test-rust: Rust library tests (when Rust code changes)
#   - test-typescript: TypeScript package tests (when TS code changes)
#   - test-sqlite-e2e: CLI E2E tests (when Rust OR E2E tests change)
#   - test-performance-regression: Performance budget validation (when Rust code changes)
#
# REMOVED JOBS:
#   - test-mcp-sqlite: MCP is being deprecated; tests moved out of CI
#   - test-daemon-integration: Daemon requires embedding provider (Ollama) not available in CI
# =============================================================================

on:
  pull_request:

# Permissions needed for dorny/paths-filter to read PR file list
permissions:
  contents: read
  pull-requests: read

# Cancel in-progress runs for PRs only (let main builds complete)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # =============================================================================
  # CHANGE DETECTION - Determines which jobs need to run
  # =============================================================================
  changes:
    name: Detect Changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      typescript: ${{ steps.filter.outputs.typescript }}
      cli: ${{ steps.filter.outputs.cli }}
      vscode: ${{ steps.filter.outputs.vscode }}
      e2e: ${{ steps.filter.outputs.e2e }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            typescript:
              - 'packages/**/*.ts'
              - 'packages/**/package.json'
              - 'pnpm-lock.yaml'
            cli:
              - 'packages/cli/**'
            vscode:
              - 'packages/vscode-maproom/**'
            e2e:
              - 'tests/e2e/**'
            workflow:
              - '.github/workflows/test.yml'
  # =============================================================================
  # TEST JOBS
  # =============================================================================

  # SQLite E2E Integration Tests
  # Tests CLI commands work correctly with SQLite backend
  test-sqlite-e2e:
    name: SQLite E2E Tests
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.e2e == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: sqlite-e2e

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run SQLite E2E tests
        run: ./tests/e2e/test_sqlite_flow.sh

      - name: Job Summary
        if: always()
        run: |
          echo "## 🗄️ SQLite E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** SQLite (primary)" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies:** None - runs standalone" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests CLI commands with SQLite backend (no Docker required)." >> $GITHUB_STEP_SUMMARY

  # Rust SQLite feature tests
  # SQLite tests run in-memory (no external service needed)
  test-rust:
    name: Rust Tests
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: sqlite

      - name: Check compilation
        run: cargo check
        working-directory: crates/maproom

      - name: Run tests
        # Use --test-threads=1 because:
        # 1. Env var race conditions in provider tests (mitigated by #[serial] but kept for safety)
        # 2. Git poller integration tests have filesystem timing sensitivity that flakes under parallel execution
        # Exclude doc tests (--lib --bins --tests) because many doc examples have
        # compilation errors (private fn references, missing imports) - pre-existing on main
        run: cargo test --lib --bins --tests -- --test-threads=1
        working-directory: crates/maproom

      - name: Job Summary
        if: always()
        run: |
          echo "## 🦀 Rust Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** SQLite (only)" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies:** None - uses in-memory database" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests Rust \`maproom\` crate (SQLite is the only backend)." >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # PERFORMANCE REGRESSION TESTS - Validates performance budgets
  # =============================================================================
  # Tests relationship expansion overhead (<20ms) and response size (<10KB).
  # These tests ensure performance budgets are maintained as code evolves.
  # =============================================================================
  test-performance-regression:
    name: Performance Regression Tests
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: performance-regression

      - name: Run performance regression tests
        run: cargo test --test performance_regression_test -- --nocapture
        working-directory: crates/maproom

      - name: Fail on performance regression
        if: failure()
        run: |
          echo "❌ Performance regression detected!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Budget Exceeded:**" >> $GITHUB_STEP_SUMMARY
          echo "- Overhead exceeds 20ms budget, OR" >> $GITHUB_STEP_SUMMARY
          echo "- Response size exceeds 10KB budget" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See test output above for details." >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Job Summary
        if: always()
        run: |
          echo "## ⚡ Performance Regression Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Performance Budgets:**" >> $GITHUB_STEP_SUMMARY
          echo "- Relationship expansion overhead: <20ms at p95" >> $GITHUB_STEP_SUMMARY
          echo "- Response size: <10KB for typical queries" >> $GITHUB_STEP_SUMMARY
          echo "- Concurrent expansions: <100ms (3 expansions)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Dependencies:** None - uses in-memory SQLite" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # TYPESCRIPT PACKAGE TESTS - Unit tests for CLI, VSCode, and Daemon packages
  # =============================================================================

  # TypeScript Package Unit Tests
  # Tests cli, vscode-maproom, and daemon-client packages
  test-typescript:
    name: TypeScript Package Tests
    needs: changes
    if: ${{ needs.changes.outputs.typescript == 'true' || needs.changes.outputs.workflow == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install tmux (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Build all packages
        run: pnpm build

      - name: Test CLI package
        working-directory: packages/cli
        run: pnpm test
        env:
          CI: true

      - name: Test VSCode extension package
        working-directory: packages/vscode-maproom
        run: pnpm test
        env:
          CI: true

      - name: Test Daemon Client package
        working-directory: packages/daemon-client
        run: pnpm test
        env:
          CI: true

      - name: Job Summary
        if: always()
        run: |
          echo "## 📦 TypeScript Package Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Packages Tested:**" >> $GITHUB_STEP_SUMMARY
          echo "- cli: Worktree management and agent orchestration" >> $GITHUB_STEP_SUMMARY
          echo "- vscode-maproom: VSCode extension" >> $GITHUB_STEP_SUMMARY
          echo "- daemon-client: Daemon RPC client" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Unit tests for TypeScript packages (no database required)." >> $GITHUB_STEP_SUMMARY
