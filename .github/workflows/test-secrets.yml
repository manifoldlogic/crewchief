name: Test Secrets Access

on:
  workflow_dispatch:

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Test VSCE_PAT secret access
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "ERROR: VSCE_PAT not accessible"
            exit 1
          fi
          echo "✓ VSCE_PAT accessible (length: ${#VSCE_PAT} characters)"

      - name: Test OVSX_PAT secret access
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "ERROR: OVSX_PAT not accessible"
            exit 1
          fi
          echo "✓ OVSX_PAT accessible (length: ${#OVSX_PAT} characters)"

      - name: Summary
        run: |
          echo "=== Secret Access Test Complete ==="
          echo "✓ VSCE_PAT: Accessible"
          echo "✓ OVSX_PAT: Accessible"
          echo "All marketplace publishing secrets configured correctly"
