name: Release VSCode Extension

on:
  push:
    tags:
      - '@crewchief/vscode-maproom@v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: true
        type: string
      pre_release:
        description: 'Publish as pre-release'
        type: boolean
        default: false

permissions:
  contents: write  # For creating GitHub releases

jobs:
  # Job 1: Build TypeScript (reusable)
  build-extension:
    name: Build TypeScript
    uses: ./.github/workflows/reusable-typescript-build.yml
    with:
      workspace_filter: '@crewchief/vscode-maproom...'
      artifact_name: 'vscode-extension-dist'

  # Job 2: Package extension (.vsix)
  package-extension:
    name: Package Extension
    runs-on: ubuntu-latest
    needs: build-extension

    outputs:
      version: ${{ steps.version.outputs.version }}
      vsix_filename: ${{ steps.package.outputs.vsix_filename }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Download TypeScript dist
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension-dist
          path: .

      - name: Verify dist structure
        run: |
          echo "Checking TypeScript dist..."
          if [ ! -d "packages/vscode-maproom/dist" ]; then
            echo "ERROR: vscode-maproom dist not found"
            exit 1
          fi
          echo "✓ vscode-maproom dist found"
          ls -la packages/vscode-maproom/dist/

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract from tag: @crewchief/vscode-maproom@v1.0.0 -> 1.0.0
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME##*@v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extension version: ${VERSION}"

      - name: Verify package.json version
        working-directory: packages/vscode-maproom
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_VERSION="${{ steps.version.outputs.version }}"

          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            echo "  package.json: $PACKAGE_VERSION"
            echo "  Expected:     $EXPECTED_VERSION"
            exit 1
          fi
          echo "✓ Version matches: $PACKAGE_VERSION"

      - name: Install vsce
        run: pnpm add -g @vscode/vsce

      - name: Package extension
        id: package
        working-directory: packages/vscode-maproom
        run: |
          # Package extension
          vsce package --out vscode-maproom-${{ steps.version.outputs.version }}.vsix

          VSIX_FILE="vscode-maproom-${{ steps.version.outputs.version }}.vsix"
          echo "vsix_filename=${VSIX_FILE}" >> $GITHUB_OUTPUT
          echo "✓ Package created: ${VSIX_FILE}"

      - name: Verify package contents
        working-directory: packages/vscode-maproom
        run: |
          VSIX_FILE="${{ steps.package.outputs.vsix_filename }}"

          # Verify .vsix exists
          if [ ! -f "$VSIX_FILE" ]; then
            echo "ERROR: .vsix file not created"
            exit 1
          fi
          echo "✓ .vsix file exists"

          # Show file size
          SIZE=$(du -h "$VSIX_FILE" | cut -f1)
          echo "✓ Package size: $SIZE"

          # List contents
          echo "Package contents:"
          unzip -l "$VSIX_FILE" | head -20

      - name: Run smoke tests
        working-directory: packages/vscode-maproom
        run: |
          VSIX_FILE="${{ steps.package.outputs.vsix_filename }}"

          # Test 1: Verify package.json in package
          if ! unzip -l "$VSIX_FILE" | grep -q "extension/package.json"; then
            echo "ERROR: package.json not found in .vsix"
            exit 1
          fi
          echo "✓ package.json present in package"

          # Test 2: Verify dist/ directory in package
          if ! unzip -l "$VSIX_FILE" | grep -q "extension/dist/"; then
            echo "ERROR: dist/ directory not found in .vsix"
            exit 1
          fi
          echo "✓ dist/ directory present in package"

          # Test 3: Verify extension.js exists
          if ! unzip -l "$VSIX_FILE" | grep -q "extension/dist/extension.js"; then
            echo "ERROR: extension.js not found in .vsix"
            exit 1
          fi
          echo "✓ extension.js present in package"

          echo "✓ All smoke tests passed"

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-vsix
          path: packages/vscode-maproom/*.vsix
          retention-days: 90
          if-no-files-found: error

      - name: Summary
        run: |
          echo "=== VSCode Extension Package Complete ==="
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Package: ${{ steps.package.outputs.vsix_filename }}"
          echo "Artifact: vscode-extension-vsix"
          echo "Ready for publishing to marketplaces"

  # Job 3: Publish to VS Code Marketplace
  publish-vscode:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: package-extension
    if: secrets.VSCE_PAT != ''

    steps:
      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension-vsix

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Code Marketplace
        run: |
          VSIX_FILE="${{ needs.package-extension.outputs.vsix_filename }}"

          if [ "${{ github.event.inputs.pre_release }}" = "true" ]; then
            echo "Publishing pre-release version..."
            if ! vsce publish --packagePath "$VSIX_FILE" --pre-release -p ${{ secrets.VSCE_PAT }}; then
              echo "ERROR: Failed to publish pre-release extension"
              echo "Common causes:"
              echo "  - Invalid or expired VSCE_PAT"
              echo "  - Version already published"
              echo "  - Publisher not found or insufficient permissions"
              echo "  - Package validation failures"
              exit 1
            fi
          else
            echo "Publishing stable version..."
            if ! vsce publish --packagePath "$VSIX_FILE" -p ${{ secrets.VSCE_PAT }}; then
              echo "ERROR: Failed to publish stable extension"
              echo "Common causes:"
              echo "  - Invalid or expired VSCE_PAT"
              echo "  - Version already published"
              echo "  - Publisher not found or insufficient permissions"
              echo "  - Package validation failures"
              exit 1
            fi
          fi

      - name: Output marketplace URL
        run: |
          PUBLISHER="manifoldlogic"
          EXTENSION="vscode-maproom"
          VERSION="${{ needs.package-extension.outputs.version }}"

          echo "=== VS Code Marketplace Publish Complete ==="
          echo "Extension: ${PUBLISHER}.${EXTENSION}"
          echo "Version: ${VERSION}"
          echo "URL: https://marketplace.visualstudio.com/items?itemName=${PUBLISHER}.${EXTENSION}"
          echo ""
          echo "Users can install with:"
          echo "  code --install-extension ${PUBLISHER}.${EXTENSION}"

  # Job 4: Publish to Open VSX Registry (parallel with publish-vscode)
  publish-ovsx:
    name: Publish to Open VSX Registry
    runs-on: ubuntu-latest
    needs: package-extension
    if: secrets.OVSX_PAT != ''

    steps:
      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension-vsix

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install ovsx
        run: npm install -g ovsx

      - name: Publish to Open VSX Registry
        run: |
          VSIX_FILE="${{ needs.package-extension.outputs.vsix_filename }}"

          echo "Publishing to Open VSX Registry..."
          if ! ovsx publish "$VSIX_FILE" -p ${{ secrets.OVSX_PAT }}; then
            echo "ERROR: Failed to publish to Open VSX Registry"
            echo "Common causes:"
            echo "  - Invalid or expired OVSX_PAT"
            echo "  - Version already published"
            echo "  - Namespace not found or insufficient permissions"
            echo "  - Package validation failures"
            echo "  - Registry temporarily unavailable"
            exit 1
          fi

      - name: Output Open VSX URL
        run: |
          NAMESPACE="manifoldlogic"
          EXTENSION="vscode-maproom"
          VERSION="${{ needs.package-extension.outputs.version }}"

          echo "=== Open VSX Registry Publish Complete ==="
          echo "Extension: ${NAMESPACE}.${EXTENSION}"
          echo "Version: ${VERSION}"
          echo "URL: https://open-vsx.org/extension/${NAMESPACE}/${EXTENSION}"
          echo ""
          echo "Available for VSCodium, Gitpod, Eclipse Theia, and other VS Code-compatible editors"

  # Job 5: Create GitHub Release (runs after publishers complete)
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [package-extension, publish-vscode, publish-ovsx]
    if: always() && (needs.publish-vscode.result == 'success' || needs.publish-ovsx.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download .vsix artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension-vsix

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Extract from tag: @crewchief/vscode-maproom@v1.0.0 -> 1.0.0
            VERSION="${GITHUB_REF#refs/tags/@crewchief/vscode-maproom@v}"
          else
            # Use workflow_dispatch input
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Prepare release tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="@crewchief/vscode-maproom@v${VERSION}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Check for existing release
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Release already exists: $TAG"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✓ No existing release found"
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.tag.outputs.tag }}"
          VSIX_FILE="${{ needs.package-extension.outputs.vsix_filename }}"

          # Build pre-release flag
          PRERELEASE_FLAG=""
          if [ "${{ github.event.inputs.pre_release }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
            echo "Creating pre-release..."
          else
            echo "Creating stable release..."
          fi

          # Create release with .vsix attachment
          gh release create "$TAG" \
            --title "VSCode Maproom v${VERSION}" \
            --notes "$(cat <<'RELEASE_NOTES'
## VSCode Maproom Extension v${VERSION}

### Installation

**From VS Code Marketplace:**
\`\`\`bash
code --install-extension manifoldlogic.vscode-maproom
\`\`\`

**From Open VSX Registry:**
Available for VSCodium, Gitpod, Eclipse Theia, and other VS Code-compatible editors.
- URL: https://open-vsx.org/extension/manifoldlogic/vscode-maproom

**Manual Installation:**
Download the .vsix file below and install using:
\`\`\`bash
code --install-extension vscode-maproom-${VERSION}.vsix
\`\`\`

### Changelog
See [CHANGELOG.md](https://github.com/danielbushman/crewchief/blob/main/packages/vscode-maproom/CHANGELOG.md) for full details.

### Links
- [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=manifoldlogic.vscode-maproom)
- [Open VSX Registry](https://open-vsx.org/extension/manifoldlogic/vscode-maproom)
- [Documentation](https://github.com/danielbushman/crewchief/tree/main/packages/vscode-maproom#readme)
RELEASE_NOTES
)" \
            $PRERELEASE_FLAG \
            "$VSIX_FILE"

          echo "✓ Release created successfully: $TAG"

      - name: Update existing release
        if: steps.check_release.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VSIX_FILE="${{ needs.package-extension.outputs.vsix_filename }}"

          echo "Updating existing release with new .vsix file..."
          gh release upload "$TAG" "$VSIX_FILE" --clobber
          echo "✓ Release updated with new .vsix file"

      - name: Output release URL
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          echo "=== GitHub Release Complete ==="
          echo "Tag: ${TAG}"
          echo "Version: ${VERSION}"
          echo "URL: https://github.com/danielbushman/crewchief/releases/tag/${TAG}"
          echo ""
          echo "Release includes:"
          echo "  - .vsix file for manual installation"
          echo "  - Changelog and version information"
          echo "  - Links to VS Code Marketplace and Open VSX Registry"
