name: Publish Maproom MCP Docker Image

# Trigger on maproom-mcp package version tags
on:
  push:
    tags:
      - '@crewchief/maproom-mcp@v*.*.*'
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.1.10)'
        required: true
      push_to_registry:
        description: 'Push to Docker Hub (true/false)'
        required: true
        default: 'false'

# Permissions for GitHub token
permissions:
  contents: read
  packages: write      # For potential ghcr.io support later

env:
  DOCKER_HUB_REPO: manifoldlogic/crewchief_maproom-mcp
  DOCKERFILE_PATH: packages/maproom-mcp/config/Dockerfile.combined
  BUILD_CONTEXT: .

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git metadata

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Setup pnpm (auto-detects from packageManager field)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 3a. Get pnpm store directory for caching
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # 3b. Setup pnpm cache
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # 4. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Build all workspace packages (creates daemon-client dist/)
      - name: Build packages
        run: pnpm build

      # 6. Set up QEMU for multi-platform emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # 7. Set up Docker Buildx (multi-platform builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # 8. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 9. Extract version from git tag or workflow_dispatch input
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from tag: @crewchief/maproom-mcp@v2.0.1 -> 2.0.1
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME##*@v}"
          fi

          echo "full=${VERSION}" >> $GITHUB_OUTPUT
          echo "minor=$(echo ${VERSION} | cut -d. -f1-2)" >> $GITHUB_OUTPUT
          echo "major=$(echo ${VERSION} | cut -d. -f1)" >> $GITHUB_OUTPUT

          echo "Extracted versions:"
          echo "  Full: ${VERSION}"
          echo "  Minor: $(echo ${VERSION} | cut -d. -f1-2)"
          echo "  Major: $(echo ${VERSION} | cut -d. -f1)"

      # 10. Generate Docker metadata (tags and labels)
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_REPO }}
          tags: |
            type=raw,value=${{ steps.version.outputs.full }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Maproom MCP Server
            org.opencontainers.image.description=Semantic code search MCP server with local LLM embeddings
            org.opencontainers.image.vendor=CrewChief
            org.opencontainers.image.version=${{ steps.version.outputs.full }}

      # 11. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push_to_registry == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.full }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      # 12. Run Trivy security scan
      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_HUB_REPO }}:${{ steps.version.outputs.full }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
