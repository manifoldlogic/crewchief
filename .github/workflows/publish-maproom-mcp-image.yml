name: Publish Maproom MCP Docker Image

# Trigger only on version tags (v1.2.3, v2.0.0, etc.)
on:
  push:
    tags:
      - 'v*.*.*'
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.1.10)'
        required: true
      push_to_registry:
        description: 'Push to Docker Hub (true/false)'
        required: true
        default: 'false'

# Permissions for GitHub token
permissions:
  contents: read
  packages: write      # For potential ghcr.io support later
  security-events: write  # For security scan uploads

env:
  DOCKER_HUB_REPO: crewchief/maproom-mcp
  DOCKERFILE_PATH: packages/maproom-mcp/config/Dockerfile.combined
  BUILD_CONTEXT: .

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git metadata

      # 2. Set up QEMU for multi-platform emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      # 3. Set up Docker Buildx (multi-platform builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Placeholder: Version extraction will be added in DKRHUB-1004
      - name: Placeholder - Version Extraction
        run: echo "Version extraction logic to be added in DKRHUB-1004"

      # Placeholder: Image build and push will be added in DKRHUB-1005
      - name: Placeholder - Build and Push
        run: echo "Multi-platform image build and push to be added in DKRHUB-1005"

      # Placeholder: Security scanning will be added in DKRHUB-1006
      - name: Placeholder - Security Scan
        run: echo "Trivy security scanning to be added in DKRHUB-1006"
