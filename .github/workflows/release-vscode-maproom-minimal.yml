name: Release VSCode Extension (Minimal Test)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test Job
    runs-on: ubuntu-latest

    steps:
      - name: Echo version
        run: echo "Version ${{ inputs.version }}"
