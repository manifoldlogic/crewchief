name: Build and Publish CLI

# Trigger on @crewchief/cli version tags and manual dispatch
on:
  push:
    tags:
      - '@crewchief/cli@v*.*.*'
  # Allow manual triggering with dry-run option
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip publish)'
        required: false
        type: boolean
        default: false

# Prevent concurrent publishes for the same tag to avoid conflicts
# cancel-in-progress: false ensures publishes complete even if new tag is pushed
concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build binaries for all 4 platforms in parallel using matrix strategy
  build-binaries:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x64 - Use cross-compilation for consistency and glibc compatibility
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            use_cross: true

          # Linux ARM64 - Cross-compile from x64 runner
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            use_cross: true

          # macOS x64 - Native build on Intel runner
          - os: macos-13
            target: x86_64-apple-darwin
            platform: darwin-x64
            use_cross: false

          # macOS ARM64 - Native build on Apple Silicon runner
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            use_cross: false

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Cache Rust dependencies and build artifacts
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/maproom -> target"
          shared-key: ${{ matrix.target }}
          cache-on-failure: true

      # Linux x64 build steps
      - name: Setup Rust toolchain
        if: matrix.platform == 'linux-x64'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross
        if: matrix.platform == 'linux-x64' && matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        if: matrix.platform == 'linux-x64'
        run: |
          cross build --release --target ${{ matrix.target }} --manifest-path crates/maproom/Cargo.toml

      - name: Strip binary
        if: matrix.platform == 'linux-x64'
        run: |
          strip target/${{ matrix.target }}/release/crewchief-maproom

      - name: Verify binary
        if: matrix.platform == 'linux-x64'
        run: |
          ls -lh target/${{ matrix.target }}/release/crewchief-maproom
          file target/${{ matrix.target }}/release/crewchief-maproom

      - name: Prepare artifact
        if: matrix.platform == 'linux-x64'
        run: |
          mkdir -p artifacts/bin/${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/crewchief-maproom artifacts/bin/${{ matrix.platform }}/

      - name: Upload artifact
        if: matrix.platform == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: artifacts/bin/${{ matrix.platform }}
          if-no-files-found: error

      # Linux ARM64 build steps
      - name: Setup Rust toolchain
        if: matrix.platform == 'linux-arm64'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross
        if: matrix.platform == 'linux-arm64' && matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        if: matrix.platform == 'linux-arm64'
        run: |
          cross build --release --target ${{ matrix.target }} --manifest-path crates/maproom/Cargo.toml

      - name: Strip binary
        if: matrix.platform == 'linux-arm64'
        run: |
          docker run --rm -v $(pwd):/workspace -w /workspace ghcr.io/cross-rs/aarch64-unknown-linux-gnu:latest \
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/crewchief-maproom

      - name: Verify binary
        if: matrix.platform == 'linux-arm64'
        run: |
          ls -lh target/${{ matrix.target }}/release/crewchief-maproom
          file target/${{ matrix.target }}/release/crewchief-maproom

      - name: Prepare artifact
        if: matrix.platform == 'linux-arm64'
        run: |
          mkdir -p artifacts/bin/${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/crewchief-maproom artifacts/bin/${{ matrix.platform }}/

      - name: Upload artifact
        if: matrix.platform == 'linux-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: artifacts/bin/${{ matrix.platform }}
          if-no-files-found: error

      # macOS x64 build steps
      - name: Setup Rust toolchain
        if: matrix.platform == 'darwin-x64'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build binary
        if: matrix.platform == 'darwin-x64'
        run: |
          cargo build --release --target ${{ matrix.target }} --manifest-path crates/maproom/Cargo.toml

      - name: Strip binary
        if: matrix.platform == 'darwin-x64'
        run: |
          strip target/${{ matrix.target }}/release/crewchief-maproom

      - name: Verify binary
        if: matrix.platform == 'darwin-x64'
        run: |
          ls -lh target/${{ matrix.target }}/release/crewchief-maproom
          file target/${{ matrix.target }}/release/crewchief-maproom

      - name: Prepare artifact
        if: matrix.platform == 'darwin-x64'
        run: |
          mkdir -p artifacts/bin/${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/crewchief-maproom artifacts/bin/${{ matrix.platform }}/

      - name: Upload artifact
        if: matrix.platform == 'darwin-x64'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: artifacts/bin/${{ matrix.platform }}
          if-no-files-found: error

      # macOS ARM64 build steps
      - name: Setup Rust toolchain
        if: matrix.platform == 'darwin-arm64'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build binary
        if: matrix.platform == 'darwin-arm64'
        run: |
          cargo build --release --target ${{ matrix.target }} --manifest-path crates/maproom/Cargo.toml

      - name: Strip binary
        if: matrix.platform == 'darwin-arm64'
        run: |
          strip target/${{ matrix.target }}/release/crewchief-maproom

      - name: Verify binary
        if: matrix.platform == 'darwin-arm64'
        run: |
          ls -lh target/${{ matrix.target }}/release/crewchief-maproom
          file target/${{ matrix.target }}/release/crewchief-maproom

      - name: Prepare artifact
        if: matrix.platform == 'darwin-arm64'
        run: |
          mkdir -p artifacts/bin/${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/crewchief-maproom artifacts/bin/${{ matrix.platform }}/

      - name: Upload artifact
        if: matrix.platform == 'darwin-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}
          path: artifacts/bin/${{ matrix.platform }}
          if-no-files-found: error

  # Validate all binaries and publish to npm (only after all builds succeed)
  validate-and-publish:
    name: Validate and Publish to npm
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: read
      id-token: write  # Required for OIDC Trusted Publishers
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Download all platform binaries
      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # Step 3: Debug artifact structure
      - name: List downloaded artifacts
        run: |
          echo "=== Artifact structure ==="
          ls -lR artifacts/

      # Step 4: Validate binaries
      - name: Validate binaries
        run: |
          #!/bin/bash
          set -e  # Fail fast on any error

          PLATFORMS=("linux-x64" "linux-arm64" "darwin-x64" "darwin-arm64")
          MIN_SIZE=5000000      # 5MB in bytes
          MAX_SIZE=20000000     # 20MB in bytes

          echo "=== Validating platform binaries ==="

          for platform in "${PLATFORMS[@]}"; do
            echo "Validating $platform..."

            BINARY_PATH="artifacts/cli-$platform/crewchief-maproom"

            # Check file exists
            if [ ! -f "$BINARY_PATH" ]; then
              echo "ERROR: Binary not found: $BINARY_PATH"
              exit 1
            fi
            echo "✓ Binary exists"

            # Check file size (5MB-20MB range for CLI binaries)
            SIZE=$(stat -c%s "$BINARY_PATH")
            if [ "$SIZE" -lt "$MIN_SIZE" ]; then
              echo "ERROR: Binary too small ($SIZE bytes, minimum $MIN_SIZE)"
              exit 1
            fi
            if [ "$SIZE" -gt "$MAX_SIZE" ]; then
              echo "ERROR: Binary too large ($SIZE bytes, maximum $MAX_SIZE)"
              exit 1
            fi
            echo "✓ Binary size valid ($SIZE bytes)"

            # Add execute permission
            chmod +x "$BINARY_PATH"
            echo "✓ Execute permission set"

            # Test execution (--version should work for Linux x64 binaries on ubuntu runner)
            # Skip execution test for cross-platform and cross-architecture binaries
            if [[ "$platform" == "linux-x64" ]]; then
              if ! "$BINARY_PATH" --version >/dev/null 2>&1; then
                echo "ERROR: Binary failed to execute --version"
                exit 1
              fi
              echo "✓ Binary executes successfully"
            else
              echo "⊘ Skipping execution test (cross-platform or cross-architecture binary)"
            fi

            echo "✓ $platform validation complete"
            echo ""
          done

          echo "=== All validations passed ==="

      # Step 5: Copy binaries to package structure
      - name: Copy binaries to package structure
        run: |
          echo "=== Organizing binaries ==="
          mkdir -p packages/cli/bin/linux-x64
          mkdir -p packages/cli/bin/linux-arm64
          mkdir -p packages/cli/bin/darwin-x64
          mkdir -p packages/cli/bin/darwin-arm64

          cp artifacts/cli-linux-x64/crewchief-maproom packages/cli/bin/linux-x64/
          cp artifacts/cli-linux-arm64/crewchief-maproom packages/cli/bin/linux-arm64/
          cp artifacts/cli-darwin-x64/crewchief-maproom packages/cli/bin/darwin-x64/
          cp artifacts/cli-darwin-arm64/crewchief-maproom packages/cli/bin/darwin-arm64/

          chmod +x packages/cli/bin/*/crewchief-maproom

          echo "=== Final package structure ==="
          ls -lR packages/cli/bin/

      # Step 6: Setup Node.js with npm registry
      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      # Step 6a: Upgrade npm to latest version for OIDC support
      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      # Step 7: Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      # Step 8: Install dependencies and build TypeScript
      - name: Install dependencies and build TypeScript
        working-directory: packages/cli
        run: |
          echo "=== Installing dependencies ==="
          pnpm install

          echo "=== Building TypeScript ==="
          pnpm build

          echo "=== Verifying build output ==="
          ls -lR dist/

      # Step 9: Validate TypeScript build
      - name: Validate TypeScript build
        run: |
          #!/bin/bash
          set -e

          echo "=== Validating TypeScript build ==="

          # Check dist directory exists
          if [ ! -d "packages/cli/dist" ]; then
            echo "ERROR: dist/ directory not found"
            exit 1
          fi
          echo "✓ dist/ directory exists"

          # Check main entry point exists
          if [ ! -f "packages/cli/dist/cli/index.js" ]; then
            echo "ERROR: Main entry point dist/cli/index.js not found"
            exit 1
          fi
          echo "✓ Main entry point exists"

          echo "=== TypeScript build validation complete ==="

      # Step 10: Create npm tarball
      - name: Create npm tarball
        working-directory: packages/cli
        run: |
          # Clean up old tarballs to avoid wildcard issues in verification
          rm -f *.tgz
          npm pack

      # Step 11: Verify tarball contains all binaries
      - name: Verify tarball contains all binaries
        working-directory: packages/cli
        run: |
          # Get version from package.json to construct exact tarball filename
          VERSION=$(node -p "require('./package.json').version")
          TARBALL="crewchief-cli-${VERSION}.tgz"

          echo "Extracting tarball contents from $TARBALL..."
          tar -tzf "$TARBALL" | grep bin/

          echo "Verifying all 4 binaries are present..."
          tar -tzf "$TARBALL" | grep "package/bin/linux-x64/crewchief-maproom"
          tar -tzf "$TARBALL" | grep "package/bin/linux-arm64/crewchief-maproom"
          tar -tzf "$TARBALL" | grep "package/bin/darwin-x64/crewchief-maproom"
          tar -tzf "$TARBALL" | grep "package/bin/darwin-arm64/crewchief-maproom"

          echo "Verifying TypeScript build artifacts..."
          tar -tzf "$TARBALL" | grep "package/dist/cli/index.js"

          echo "✓ All binaries and build artifacts present in tarball"

      # Step 12: Publish to npm (conditional)
      # Note: --provenance removed because it requires public repository
      # OIDC authentication still works for private repos without provenance
      - name: Publish to npm
        if: '!inputs.dry_run'
        working-directory: packages/cli
        run: |
          # Retry logic for network resilience
          for i in 1 2 3; do
            npm publish --access public && break || {
              if [ $i -lt 3 ]; then
                echo "Publish attempt $i failed, retrying in 10 seconds..."
                sleep 10
              else
                echo "All publish attempts failed"
                exit 1
              fi
            }
          done

      # Step 13: Verify package on npm registry
      - name: Verify package on npm registry
        if: '!inputs.dry_run'
        working-directory: packages/cli
        run: |
          # Wait for npm to propagate
          sleep 10

          # Get package version from package.json
          VERSION=$(node -p "require('./package.json').version")

          # Verify package is available
          npm view @crewchief/cli@$VERSION version

          echo "✓ Package verified on npm registry"
          echo "Package: @crewchief/cli@$VERSION"
          echo "Download: npm install @crewchief/cli@$VERSION"
          echo "Registry: https://www.npmjs.com/package/@crewchief/cli/v/$VERSION"

      # Step 14: Dry run summary
      - name: Dry run summary
        if: inputs.dry_run
        working-directory: packages/cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "DRY RUN MODE - Publish skipped"
          echo "Would publish: @crewchief/cli@$VERSION"
          echo "Tarball verified and ready for publication"
