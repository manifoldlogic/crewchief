# =============================================================================
# PostgreSQL for VSCode Maproom Extension - Development & Team Sharing
# =============================================================================
#
# This Docker Compose provides PostgreSQL with pgvector for the VSCode extension.
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │  DO YOU NEED THIS?                                                       │
# │                                                                          │
# │  The VSCode extension supports SQLite-first activation:                  │
# │    • Opens instantly without waiting for Docker                          │
# │    • Uses ~/.maproom/maproom.db automatically                            │
# │    • No configuration required                                           │
# │                                                                          │
# │  Use PostgreSQL (this file) when you need:                               │
# │    • Multiple team members sharing a code index                          │
# │    • Running the test suite with postgres-test container                 │
# │    • Development of PostgreSQL-specific features                         │
# └──────────────────────────────────────────────────────────────────────────┘
#
# Quick start (PostgreSQL):
#   docker compose up -d
#   # Extension will auto-detect maproom-postgres container
#
# For SQLite (recommended for most users):
#   # Just open VSCode - extension works without Docker
#
# See docs/architecture/DATABASE_ARCHITECTURE.md for backend comparison.
#
name: crewchief-dev-env

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: maproom-postgres
    environment:
      POSTGRES_DB: maproom
      POSTGRES_USER: maproom
      POSTGRES_PASSWORD: maproom
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - maproom-data:/var/lib/postgresql/data
      # Note: init.sql mount disabled in dev container due to Docker-in-Docker limitations
      # Schema will be initialized via migrations or manual SQL execution
      # - /workspace/packages/maproom-mcp/config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # Note: postgresql.conf mount disabled in dev container due to Docker-in-Docker limitations
      # Using command-line overrides instead (see command below)
      # - /workspace/packages/maproom-mcp/config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "0.0.0.0:5433:5432"  # Bind to all interfaces for Docker-in-Docker compatibility
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=512MB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c maintenance_io_concurrency=100
      -c work_mem=16MB
      -c min_wal_size=512MB
      -c max_wal_size=2GB
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
    networks:
      maproom-network:
        aliases:
          - maproom-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maproom -d maproom"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Test database for integration tests (opt-in, not started by default)
  # Start with: docker compose --profile test up -d postgres-test
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: maproom-postgres-test
    profiles:
      - test
    environment:
      POSTGRES_DB: maproom_test
      POSTGRES_USER: maproom
      POSTGRES_PASSWORD: maproom
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - maproom-test-data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5434:5432"  # Test database on port 5434
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=256MB
      -c work_mem=8MB
    networks:
      maproom-network:
        aliases:
          - maproom-postgres-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maproom -d maproom_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  maproom-data:
    driver: local
  maproom-test-data:
    driver: local

networks:
  maproom-network:
    driver: bridge
