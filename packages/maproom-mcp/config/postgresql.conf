# ============================================================================
# PostgreSQL Configuration for Maproom Semantic Code Search
# ============================================================================
#
# Optimized for: 4-8GB RAM systems with SSD storage
# Workload: Vector similarity search (pgvector), Full-Text Search (FTS),
#           read-heavy concurrent queries, background embedding generation
#
# System Targets:
# - RAM: 4GB minimum, 8GB recommended
# - Storage: SSD (NVMe or SATA)
# - Typical database size: <1GB (500-1000 files)
# - Concurrent connections: 10-20 typical
#
# ============================================================================

# ----------------------------------------------------------------------------
# CONNECTION SETTINGS
# ----------------------------------------------------------------------------

# Maximum number of concurrent connections
# Maproom MCP typically uses 1-5 connections, but allow headroom for admin
max_connections = 50
# Reduced from default 100 - frees ~2MB RAM per unused connection slot
# Maproom workload: Single MCP server + occasional admin queries


# ----------------------------------------------------------------------------
# MEMORY SETTINGS
# ----------------------------------------------------------------------------

# SHARED BUFFERS: PostgreSQL's main cache for data pages
# Recommended: 25% of system RAM for dedicated database servers
# For 4GB RAM system: 1GB, For 8GB RAM system: 2GB
# Starting conservative at 512MB for 4GB minimum spec
shared_buffers = 512MB
# This is cached data shared across all connections
# Tuning note: Can increase to 1GB on 8GB systems for better caching


# EFFECTIVE CACHE SIZE: Planner's estimate of OS + PG cache
# Recommended: 50-75% of total system RAM
# For 4GB RAM: 2.5GB, For 8GB RAM: 5GB
effective_cache_size = 3GB
# This doesn't allocate memory, just tells the planner how much caching is available
# Set to 50% of 6GB (typical available after OS overhead on 8GB system)


# WORK MEM: Memory for sorts, hash tables, and query operations
# Critical for vector similarity searches and FTS ranking
# Default 4MB is too low for pgvector operations
work_mem = 16MB
# Each concurrent query can use this much memory for sorting
# With max 10 concurrent searches: 10 × 16MB = 160MB peak
# Vector searches benefit from larger work_mem for distance calculations
# Tuning note: Monitor for "external sort" in EXPLAIN ANALYZE - indicates too low


# MAINTENANCE WORK MEM: Memory for VACUUM, CREATE INDEX, ALTER TABLE
# Important for building ivfflat vector indexes
maintenance_work_mem = 256MB
# Used during index creation - ivfflat index building benefits from larger values
# For large repositories (10k+ chunks), can temporarily increase to 512MB
# Safe to set high since only 1-2 maintenance operations run concurrently


# ----------------------------------------------------------------------------
# QUERY PLANNER SETTINGS (SSD-Optimized)
# ----------------------------------------------------------------------------

# RANDOM PAGE COST: Planner's cost estimate for non-sequential disk reads
# Default 4.0 assumes HDD (seek time dominates)
# For SSD: 1.0-1.5 (seek time negligible)
random_page_cost = 1.1
# Critical setting! Default 4.0 causes planner to avoid index scans
# With SSD, random access is nearly as fast as sequential
# Setting to 1.1 encourages proper index usage for vector searches


# EFFECTIVE IO CONCURRENCY: Number of concurrent disk operations
# For SSD: 200-300, For NVMe SSD: 300-400, For HDD: 2-4
effective_io_concurrency = 200
# Allows PostgreSQL to issue multiple concurrent I/O requests
# SSDs handle high queue depths efficiently
# Important for parallel scans and large result sets


# MAINTENANCE IO CONCURRENCY: I/O concurrency for maintenance operations
maintenance_io_concurrency = 100
# Used during VACUUM, CREATE INDEX operations
# Lower than effective_io_concurrency to avoid starving foreground queries


# DEFAULT STATISTICS TARGET: Sample size for ANALYZE
# Default 100 is good balance for most workloads
default_statistics_target = 100
# Higher values (200-300) improve query plans but slow ANALYZE
# Current value is appropriate for Maproom's data distribution


# PARALLEL QUERY SETTINGS
# Enable parallel workers for large scans
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
# Vector searches on large tables can benefit from parallelism
# Limit to 2-4 workers to avoid CPU contention with embedding generation


# ----------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL) SETTINGS
# ----------------------------------------------------------------------------

# WAL BUFFERS: Shared memory for WAL data before writing to disk
wal_buffers = 16MB
# Default -1 (auto) would be 3% of shared_buffers = ~15MB
# Explicitly setting to 16MB for predictability
# Maproom is read-heavy, so doesn't need aggressive tuning


# CHECKPOINT SETTINGS: Control when data is flushed to disk
checkpoint_completion_target = 0.9
# Spread checkpoint writes over 90% of checkpoint interval
# Smooths I/O load, reduces checkpoint spikes
# Good for SSD longevity and consistent query performance


# WAL SIZE LIMITS: Control checkpoint frequency via WAL volume
min_wal_size = 512MB
max_wal_size = 2GB
# Checkpoints triggered when WAL exceeds max_wal_size
# Maproom: mostly reads with periodic bulk inserts during indexing
# 2GB max allows ~5-10 minutes between checkpoints during heavy indexing
# Larger values = less frequent checkpoints but longer crash recovery


# ----------------------------------------------------------------------------
# AUTOVACUUM SETTINGS
# ----------------------------------------------------------------------------

# Keep defaults for autovacuum - they work well for Maproom's workload
# autovacuum = on (default)
# autovacuum_max_workers = 3 (default)
# autovacuum_naptime = 1min (default)

# Maproom-specific note:
# Vector embeddings are write-once, read-many (low update rate)
# FTS tsvector columns updated on file changes (moderate churn)
# Default autovacuum settings handle this well


# ----------------------------------------------------------------------------
# LOGGING AND MONITORING
# ----------------------------------------------------------------------------

# Useful for performance analysis and debugging
# log_min_duration_statement = 1000  # Log queries > 1 second (optional)
# log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
# log_checkpoints = on
# log_connections = off
# log_disconnections = off
# log_lock_waits = on

# Uncomment above settings for troubleshooting slow queries
# Keep commented for production to minimize log volume


# ----------------------------------------------------------------------------
# LOCALE AND TEXT SEARCH
# ----------------------------------------------------------------------------

# Default locale and text search configurations work well
# lc_messages, lc_monetary, lc_numeric, lc_time use container defaults
# default_text_search_config = 'pg_catalog.simple'  # Maproom uses 'simple' config


# ----------------------------------------------------------------------------
# EXTENSION-SPECIFIC SETTINGS
# ----------------------------------------------------------------------------

# PGVECTOR: No tunable parameters at postgresql.conf level
# Index tuning done via CREATE INDEX ... WITH (lists = N)
# Current ivfflat settings in schema:
#   - lists = 200 (for <100k chunks)
#   - Should scale to sqrt(rows) as database grows
#   - For 1M chunks: lists = 1000

# PG_TRGM: Uses GIN indexes for fuzzy matching
# No additional tuning required beyond default GIN parameters


# ----------------------------------------------------------------------------
# RESOURCE LIMITS AND SAFETY
# ----------------------------------------------------------------------------

# Statement timeout: Prevent runaway queries
# statement_timeout = 30000  # 30 seconds (optional, commented for dev)
# Uncomment in production to prevent queries from hanging indefinitely

# Lock timeout: Prevent deadlocks from stalling the system
# lock_timeout = 10000  # 10 seconds (optional)

# Temp file limit: Prevent disk exhaustion from large sorts
# temp_file_limit = 2GB  # Limit temp files to 2GB (optional)


# ============================================================================
# TUNING NOTES AND RECOMMENDATIONS
# ============================================================================
#
# MINIMUM SPEC (4GB RAM, 100-500 files):
#   - shared_buffers = 512MB
#   - effective_cache_size = 2.5GB
#   - work_mem = 16MB
#   - Expect: <50ms p95 search latency
#
# RECOMMENDED SPEC (8GB RAM, 500-5000 files):
#   - shared_buffers = 1GB  (increase from 512MB)
#   - effective_cache_size = 5GB  (increase from 3GB)
#   - work_mem = 16MB  (keep same)
#   - Expect: <30ms p95 search latency
#
# PERFORMANCE MONITORING:
#   - Check cache hit ratio: Should be >95%
#     SELECT blks_hit::float / (blks_hit + blks_read) AS cache_hit_ratio
#     FROM pg_stat_database WHERE datname = 'maproom';
#
#   - Check index usage: Should use indexes, not seq scans
#     SELECT schemaname, tablename, seq_scan, idx_scan
#     FROM pg_stat_user_tables WHERE schemaname = 'maproom';
#
#   - Check query plans: Use EXPLAIN ANALYZE for slow queries
#
# SCALING GUIDANCE:
#   - At 10k chunks: Rebuild ivfflat indexes with lists = 100
#   - At 100k chunks: Rebuild with lists = 316 (sqrt(100k))
#   - At 1M chunks: Rebuild with lists = 1000 (sqrt(1M))
#   - Consider HNSW indexes if pgvector 0.5.0+ available
#
# ============================================================================
