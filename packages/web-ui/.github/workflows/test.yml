name: Web UI Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/web-ui/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/web-ui/**'
      - '.github/workflows/test.yml'

defaults:
  run:
    working-directory: packages/web-ui

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: crewchief_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Type check
        run: pnpm build:server && pnpm build:client

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/crewchief_test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test
          PGPASSWORD: test
          PGDATABASE: crewchief_test
        run: |
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5432 -U test; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          
          # Create additional test databases
          psql -h localhost -U test -c "CREATE DATABASE crewchief_integration_test;" || true
          psql -h localhost -U test -c "CREATE DATABASE crewchief_e2e_test;" || true

      - name: Run unit tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/crewchief_test
        run: pnpm test:unit

      - name: Run integration tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/crewchief_integration_test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test
          PGPASSWORD: test
          PGDATABASE: crewchief_integration_test
        run: pnpm test:integration

      - name: Generate coverage report
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/crewchief_test
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./packages/web-ui/coverage/lcov.info
          flags: web-ui
          name: web-ui-coverage
          fail_ci_if_error: false

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/crewchief_e2e_test
          CI: true
        run: pnpm test:e2e

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/web-ui/test-results/
          retention-days: 30

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/web-ui/coverage/
          retention-days: 30

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level moderate

      - name: Check for vulnerable dependencies
        run: npx audit-ci --moderate

  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Check bundle size
        run: |
          # Check if bundle size is reasonable (adjust limits as needed)
          if [ -d "dist" ]; then
            BUNDLE_SIZE=$(du -sh dist | cut -f1)
            echo "Bundle size: $BUNDLE_SIZE"
            
            # Convert to MB for comparison (basic check)
            SIZE_MB=$(du -sm dist | cut -f1)
            if [ $SIZE_MB -gt 50 ]; then
              echo "Warning: Bundle size is quite large ($SIZE_MB MB)"
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: packages/web-ui/dist/
          retention-days: 7