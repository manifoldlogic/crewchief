# Maproom Infrastructure Services
#
# This docker-compose provides the database infrastructure for Maproom.
# The MCP server runs on the host via `npx @crewchief/maproom-mcp`.
#
# Quick start:
#   docker compose up -d
#   npx @crewchief/maproom-mcp
#
# For VSCode extension users, use the extension's docker-compose instead:
#   packages/vscode-maproom/config/docker-compose.yml

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: maproom-postgres
    environment:
      POSTGRES_DB: maproom
      POSTGRES_USER: maproom
      POSTGRES_PASSWORD: maproom
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - maproom-data:/var/lib/postgresql/data
      - maproom-init-sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"  # Expose on 5433 for MCP server running on host
    networks:
      maproom-network:
        aliases:
          - maproom-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maproom -d maproom"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Optional: Ollama for local embeddings
  # Uncomment if using MAPROOM_EMBEDDING_PROVIDER=ollama
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: maproom-ollama
  #   environment:
  #     - OLLAMA_NUM_PARALLEL=4
  #     - OLLAMA_MAX_LOADED_MODELS=1
  #     - OLLAMA_NUM_THREAD=12
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   ports:
  #     - "${OLLAMA_PORT:-11434}:11434"
  #   networks:
  #     - maproom-network
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 120s
  #   restart: unless-stopped
  #   entrypoint: ["/bin/sh", "-c"]
  #   command: >
  #     "ollama serve &
  #     OLLAMA_PID=$$!;
  #     sleep 5;
  #     ollama pull nomic-embed-text;
  #     wait $$OLLAMA_PID"

volumes:
  maproom-data:
    driver: local
  # ollama-models:
  #   driver: local
  maproom-init-sql:
    external: true

networks:
  maproom-network:
    driver: bridge
