# CrewChief Web UI Development Override
# Extends docker-compose.yml with development-specific configuration

services:
  # Development PostgreSQL with additional tools
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: crewchief
      POSTGRES_PASSWORD: crewchief
      POSTGRES_DB: crewchief_web
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crewchief"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./packages/web-ui/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./packages/web-ui/seeds:/docker-entrypoint-initdb.d/seeds:ro

  # Development Redis
  redis:
    environment:
      REDIS_PASSWORD: dev_password
    command: redis-server --appendonly yes --requirepass dev_password
    ports:
      - "6380:6379"  # Different port to avoid conflicts
    volumes:
      - redis_dev_data:/data

  # Development Web UI with hot reload
  web-ui:
    build:
      context: .
      dockerfile: packages/web-ui/Dockerfile.dev
      target: development
    container_name: crewchief-web-ui-dev
    environment:
      NODE_ENV: development
      PORT: 3456
      # Database configuration
      CREWCHIEF_DB_HOST: postgres
      CREWCHIEF_DB_PORT: 5432
      CREWCHIEF_DB_NAME: crewchief_dev
      CREWCHIEF_DB_USER: postgres
      CREWCHIEF_DB_PASSWORD: dev_password
      CREWCHIEF_DB_SSL: "false"
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: dev_password
      # Development configuration
      SESSION_SECRET: dev_session_secret_change_in_production
      JWT_SECRET: dev_jwt_secret_change_in_production
      LOG_LEVEL: debug
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3456,http://localhost:5173"
      # Development features
      VITE_API_BASE_URL: http://localhost:3456/api
      VITE_WS_URL: ws://localhost:3456
    ports:
      - "3456:3456"  # Backend server
      - "3000:3000"  # Frontend dev server (Vite)
      - "9229:9229"  # Node.js debug port
    volumes:
      # Mount source code for hot reload
      - ./packages/web-ui/src:/app/packages/web-ui/src:ro
      - ./packages/web-ui/public:/app/packages/web-ui/public:ro
      - ./packages/web-ui/package.json:/app/packages/web-ui/package.json:ro
      - ./packages/web-ui/vite.config.ts:/app/packages/web-ui/vite.config.ts:ro
      - ./packages/web-ui/tailwind.config.js:/app/packages/web-ui/tailwind.config.js:ro
      - ./packages/web-ui/postcss.config.js:/app/packages/web-ui/postcss.config.js:ro
      - ./packages/web-ui/tsconfig.json:/app/packages/web-ui/tsconfig.json:ro
      - ./packages/web-ui/tsconfig.client.json:/app/packages/web-ui/tsconfig.client.json:ro
      - ./packages/web-ui/tsconfig.node.json:/app/packages/web-ui/tsconfig.node.json:ro
      # Node modules volume for performance
      - web_ui_node_modules:/app/packages/web-ui/node_modules
    command: ["pnpm", "dev"]

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crewchief-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@crewchief.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres
    networks:
      - crewchief-network
    profiles:
      - dev-tools  # Optional service, run with --profile dev-tools

  # Redis Commander for Redis management (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: crewchief-redis-commander
    environment:
      REDIS_HOSTS: redis:redis:6379:0:dev_password
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - crewchief-network
    profiles:
      - dev-tools  # Optional service, run with --profile dev-tools

networks:
  crewchief-network:
    driver: bridge
    name: crewchief-dev-network

volumes:
  postgres_dev_data:
    driver: local
    name: crewchief-postgres-dev-data
  redis_dev_data:
    driver: local
    name: crewchief-redis-dev-data
  pgadmin_data:
    driver: local
    name: crewchief-pgadmin-data
  web_ui_node_modules:
    driver: local
    name: crewchief-web-ui-node-modules